services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flashlink-app
    ports:
      - "9808:9808"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      PORT: 9808
      GIN_MODE: release
      REDIS_URL: redis://redis:6379
      PUBLIC_BASE_URL: http://localhost:9808
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flashlink-frontend
    ports:
      - "3000:3000"
    depends_on:
      app:
        condition: service_started
    environment:
      BACKEND_API_URL: http://app:9808
      NODE_ENV: production
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: flashlink-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
